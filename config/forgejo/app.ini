; =============================================================================
; Forgejo — Configuration app.ini
; Ce fichier est monté dans le container Forgejo via Docker volumes.
; La plupart des valeurs sont surchargées par les variables d'environnement
; dans docker-compose.yml — ce fichier sert de référence et de documentation.
; =============================================================================

APP_NAME = AgentForge Workspace
RUN_USER = git
RUN_MODE = prod
WORK_PATH = /data/gitea

[database]
DB_TYPE  = postgres
HOST     = postgres_forgejo:5432
NAME     = forgejo
USER     = forgejo
PASSWD   = forgejo_db_password_here
SSL_MODE = disable
SCHEMA   = public
CHARSET  = utf8
LOG_SQL  = false

[repository]
ROOT = /data/git/repositories
; Permettre les pushes forcés sur les branches de feature (pas sur main)
DISABLE_HTTP_GIT        = false
DEFAULT_BRANCH          = main
DEFAULT_PUSH_CREATE_ORG = false
MAX_CREATION_LIMIT      = -1
PREFERRED_LICENSES      = MIT,Apache License 2.0

[repository.local]
LOCAL_COPY_PATH = /data/gitea/tmp/local-repo

[repository.upload]
ENABLED        = true
TEMP_PATH      = /data/gitea/uploads
ALLOWED_TYPES  =
FILE_MAX_SIZE  = 50
MAX_FILES      = 5

[server]
PROTOCOL                = http
DOMAIN                  = localhost
ROOT_URL                = http://localhost:3000/
HTTP_ADDR               = 0.0.0.0
HTTP_PORT               = 3000
SSH_DOMAIN              = localhost
SSH_PORT                = 22
SSH_LISTEN_HOST         = 0.0.0.0
SSH_LISTEN_PORT         = 22
LFS_START_SERVER        = true
LFS_JWT_SECRET          =
OFFLINE_MODE            = true
; Désactiver la vérification du token CSRF pour les webhooks entrants
DISABLE_REGISTRATION    = false

[database]
LOG_SQL = false

[indexer]
ISSUE_INDEXER_TYPE = bleve
ISSUE_INDEXER_PATH = /data/gitea/indexers/issues.bleve
REPO_INDEXER_ENABLED = false

[queue]
TYPE           = level
DATADIR        = /data/gitea/queues/

[admin]
DISABLE_REGULAR_ORG_CREATION = false

[security]
INSTALL_LOCK                   = true
SECRET_KEY                     =
MIN_PASSWORD_LENGTH            = 8
IMPORT_LOCAL_PATHS             = false
DISABLE_GIT_HOOKS              = false
PASSWORD_HASH_ALGO             = pbkdf2

[camo]
ENABLED = false

[attachment]
ENABLED   = true
PATH      = /data/gitea/attachments
MAX_SIZE  = 4
MAX_FILES = 5

[log]
ROOT_PATH = /data/gitea/log
MODE      = console
LEVEL     = Info
ROUTER    = console

[cron]
ENABLED = true

[cron.update_mirrors]
SCHEDULE = @every 10m

[cron.run_task]
SCHEDULE = @every 1m

[git]
MAX_GIT_DIFF_LINES           = 1000
MAX_GIT_DIFF_LINE_CHARACTERS = 5000
MAX_GIT_DIFF_FILES           = 100
GC_ARGS                      =

[git.timeout]
DEFAULT = 360
MIGRATE = 600
MIRROR  = 300
CLONE   = 300
PULL    = 300
GC      = 60

[mirror]
DEFAULT_INTERVAL = 8h
MIN_INTERVAL     = 10m

[api]
ENABLE_SWAGGER  = true
MAX_RESPONSE_ITEMS = 50
DEFAULT_PAGING_NUM = 20
DEFAULT_GIT_TREES_PER_PAGE = 1000
DEFAULT_MAX_BLOB_SIZE = 10485760

[i18n]
LANGS = en-US,fr-FR
NAMES = English,Français

[time]
FORMAT       =
DEFAULT_UI_LOCATION =

[oauth2]
ENABLE           = true
ACCESS_TOKEN_EXPIRATION_TIME = 3600
REFRESH_TOKEN_EXPIRATION_TIME = 730

[session]
PROVIDER        = file
PROVIDER_CONFIG = /data/gitea/sessions
COOKIE_NAME     = i_like_gitea
COOKIE_SECURE   = false
SESSION_LIFE_TIME = 86400

[cache]
ADAPTER  = memory
INTERVAL = 60
HOST     =

[mailer]
ENABLED = false

[webhook]
; Permettre les webhooks vers le réseau interne Docker
ALLOWED_HOST_LIST = *
SKIP_TLS_VERIFY   = true
; Délai de délivrance des webhooks
DELIVER_TIMEOUT   = 10
QUEUE_LENGTH      = 1000

[picture]
AVATAR_UPLOAD_PATH      = /data/gitea/avatars
REPOSITORY_AVATAR_UPLOAD_PATH = /data/gitea/repo-avatars
GRAVATAR_SOURCE         = gravatar
DISABLE_GRAVATAR        = true
ENABLE_FEDERATED_AVATAR = false

[project]
PROJECT_BOARD_DEFAULT_KANBAN_TYPE = todo,in-progress,in-review,done

[ui]
DEFAULT_THEME         = auto
THEMES                = auto,forgejo-auto,forgejo-light,forgejo-dark
AMBIGUOUS_UNICODE_DETECTION = true
DEFAULT_SHOW_FULL_NAME = false
SEARCH_REPO_DESCRIPTION = true
ONLY_SHOW_RELEVANT_REPOS = false

[ui.admin]
USER_PAGING_NUM   = 50
REPO_PAGING_NUM   = 50
NOTICE_PAGING_NUM = 25
ORG_PAGING_NUM    = 50

[ui.user]
REPO_PAGING_NUM = 15

[ui.meta]
AUTHOR      = AgentForge
DESCRIPTION = Plateforme d'agents IA self-hosted
KEYWORDS    = agentforge,ai,agents

[markdown]
ENABLE_HARD_LINE_BREAK_IN_COMMENTS  = true
ENABLE_HARD_LINE_BREAK_IN_DOCUMENTS = false
CUSTOM_URL_SCHEMES                  =
FILE_EXTENSIONS                     = .md,.markdown,.mdown,.mkd

[metrics]
ENABLED = false
TOKEN   =

[federation]
ENABLED = false

[packages]
ENABLED       = false
CHUNKED_UPLOAD_PATH = /data/gitea/tmp/package-upload
